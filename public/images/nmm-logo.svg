<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 370" width="320" height="370">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400;1,600;1,700&amp;family=Inter:wght@300;400;700&amp;display=swap');
    </style>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d478;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a7228;stop-opacity:1" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000088"/>
    </filter>

    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>

    <clipPath id="cardClip">
      <rect width="320" height="370" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="320" height="370" fill="#0f0e0c" rx="8"/>

  <!-- Diagonal accent lines -->
  <g clip-path="url(#cardClip)">
    <line x1="0" y1="320" x2="320" y2="0" stroke="#c9a84c" stroke-width="0.4" opacity="0.12"/>
    <line x1="-50" y1="320" x2="270" y2="0" stroke="#c9a84c" stroke-width="0.3" opacity="0.07"/>
    <line x1="50" y1="320" x2="370" y2="0" stroke="#c9a84c" stroke-width="0.3" opacity="0.07"/>
  </g>

  <!-- N — white, top-left -->
  <text
    x="105" y="147"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Garamond', 'Times New Roman', Georgia, serif"
    font-size="106" font-style="italic" font-weight="300"
    fill="#ffffff"
    filter="url(#softShadow)"
  >N</text>

  <!-- Second M — white, bottom-right -->
  <text
    x="221" y="244"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Garamond', 'Times New Roman', Georgia, serif"
    font-size="106" font-style="italic" font-weight="300"
    fill="#ffffff"
    filter="url(#softShadow)"
  >M</text>

  <!-- Gold M — dead center, front -->
  <text
    x="160" y="200"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Garamond', 'Times New Roman', Georgia, serif"
    font-size="132" font-style="italic" font-weight="700"
    fill="url(#goldGrad)"
    filter="url(#goldShadow)"
  >M</text>

  <!-- Dividing line -->
  <line x1="40" y1="268" x2="280" y2="268" stroke="#c9a84c" stroke-width="1" opacity="0.7"/>

  <!-- NIK MATHEWS — gold -->
  <text
    x="160" y="302"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="400"
    fill="#c9a84c" opacity="1"
    text-anchor="middle" letter-spacing="3"
  >NIK MATHEWS</text>

  <!-- SINGER &amp; GUITARIST — white, bold -->
  <text
    x="160" y="332"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="15.5" font-weight="700"
    fill="#ffffff" opacity="0.95"
    text-anchor="middle" letter-spacing="2.5"
  >SINGER &amp; GUITARIST</text>

</svg>
