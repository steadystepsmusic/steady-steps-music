<svg width="600" height="640" viewBox="0 0 600 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="640" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="300" y="64" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="52" font-weight="700" fill="#ffffff">Open Strings</text>
  <text x="300" y="104" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26" font-weight="400" fill="#e2e8f0">E – A – D – G – B – e</text>

  <!-- Open string indicators (all 6 strings) -->
  <circle cx="100" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="180" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="260" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="340" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="420" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="500" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>

  <!-- Nut -->
  <rect x="100" y="156" width="400" height="8" fill="#f0fdfa" rx="2"/>

  <!-- Fret lines (4 frets) -->
  <line x1="100" y1="244" x2="500" y2="244" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="324" x2="500" y2="324" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="404" x2="500" y2="404" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="484" x2="500" y2="484" stroke="#334155" stroke-width="1.5"/>

  <!-- String lines (6 strings) -->
  <line x1="100" y1="164" x2="100" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="180" y1="164" x2="180" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="164" x2="260" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="340" y1="164" x2="340" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="164" x2="420" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="500" y1="164" x2="500" y2="484" stroke="#475569" stroke-width="1.5"/>

  <!-- String name labels at bottom -->
  <text x="100" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">E</text>
  <text x="180" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">A</text>
  <text x="260" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">D</text>
  <text x="340" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">G</text>
  <text x="420" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">B</text>
  <text x="500" y="610" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#e2e8f0">e</text>
</svg>
