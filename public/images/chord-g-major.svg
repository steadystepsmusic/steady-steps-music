<svg width="600" height="560" viewBox="0 0 600 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="560" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="300" y="64" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="52" font-weight="700" fill="#ffffff">G Major</text>
  <text x="300" y="104" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26" font-weight="400" fill="#94a3b8">G – B – D</text>

  <!-- Open string indicators (strings 4, 3, 2) -->
  <!-- String 6=x100, 5=x180, 4=x260, 3=x340, 2=x420, 1=x500 -->
  <circle cx="260" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="340" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="420" cy="136" r="12" fill="none" stroke="#4ade80" stroke-width="2.5"/>

  <!-- Nut -->
  <rect x="100" y="156" width="400" height="8" fill="#f0fdfa" rx="2"/>

  <!-- Fret lines (4 frets = 5 lines after nut) -->
  <line x1="100" y1="244" x2="500" y2="244" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="324" x2="500" y2="324" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="404" x2="500" y2="404" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="484" x2="500" y2="484" stroke="#334155" stroke-width="1.5"/>

  <!-- String lines (6 strings) -->
  <line x1="100" y1="164" x2="100" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="180" y1="164" x2="180" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="260" y1="164" x2="260" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="340" y1="164" x2="340" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="420" y1="164" x2="420" y2="484" stroke="#475569" stroke-width="1.5"/>
  <line x1="500" y1="164" x2="500" y2="484" stroke="#475569" stroke-width="1.5"/>

  <!-- Finger dots -->
  <!-- Finger 1: string 5, fret 2 → x=180, y=164+(2-1+0.5)*80=284 -->
  <circle cx="180" cy="284" r="22" fill="#14b8a6"/>
  <text x="180" y="291" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" font-weight="700" fill="white">1</text>

  <!-- Finger 2: string 6, fret 3 → x=100, y=164+(3-1+0.5)*80=364 -->
  <circle cx="100" cy="364" r="22" fill="#14b8a6"/>
  <text x="100" y="371" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" font-weight="700" fill="white">2</text>

  <!-- Finger 3: string 1, fret 3 → x=500, y=364 -->
  <circle cx="500" cy="364" r="22" fill="#14b8a6"/>
  <text x="500" y="371" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" font-weight="700" fill="white">3</text>

  <!-- String name labels at bottom -->
  <text x="100" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">E</text>
  <text x="180" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">A</text>
  <text x="260" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">D</text>
  <text x="340" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">G</text>
  <text x="420" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">B</text>
  <text x="500" y="530" text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" fill="#64748b">e</text>
</svg>
