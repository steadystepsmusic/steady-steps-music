<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#0f172a"/>

  <!-- Staircase mark — scaled to fit upper portion, L-shaped paths, no seams -->
  <!-- Step 1: dark navy -->
  <path d="M94 276 L94 240 L166 240 L166 204 L202 204 L202 276 Z" fill="#162D6E"/>
  <!-- Step 2: blue -->
  <path d="M166 204 L166 168 L238 168 L238 132 L274 132 L274 204 Z" fill="#2563EB"/>
  <!-- Step 3: sky blue -->
  <path d="M238 132 L238 96 L310 96 L310 60 L346 60 L346 132 Z" fill="#7DD3FC"/>
  <!-- Step 4: teal (top cap) -->
  <rect x="310" y="24" width="108" height="36" fill="#2DD4BF"/>

  <!-- Wordmark -->
  <text
    x="256"
    y="355"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="56"
    font-weight="700"
  ><tspan fill="#ffffff">Steady</tspan><tspan fill="#2DD4BF">Steps</tspan></text>

  <text
    x="256"
    y="418"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="38"
    font-weight="300"
    fill="#ffffff"
    style="letter-spacing: 0.22em"
  >MUSIC</text>
</svg>
