    <path d="M840 496 L840 448 L936 448 L936 400 L984 400 L984 496 Z" fill="#2563EB"/>
    <path d="M936 400 L936 352 L1032 352 L1032 304 L1080 304 L1080 400 Z" fill="#7DD3FC"/>
    <rect x="1032" y="256" width="144" height="48" fill="#2DD4BF"/>

